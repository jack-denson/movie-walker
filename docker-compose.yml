services:
  app:
    build:
      # root context so the image can copy in /public, /api, and /helpers
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DB_CONN_STR: mongodb://${MONGO_USERNAME:-moviewalker}:${MONGO_PASSWORD:-moviewalker}@mongo:27017/?authSource=admin
      REDIS_CONN_STR: redis://redis:6379
    ports:
      - "4000:4000"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - movie-walker

  challenge-generator:
    profiles:
      - tools
    build:
      # root context so the image can copy in the shared /helpers folder
      context: .
      dockerfile: challenge-generator/Dockerfile
    env_file:
      - .env
    environment:
      DB_CONN_STR: mongodb://${MONGO_USERNAME:-moviewalker}:${MONGO_PASSWORD:-moviewalker}@mongo:27017/?authSource=admin
      REDIS_CONN_STR: redis://redis:6379
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - movie-walker

  mongo:
    image: mongo:4.4.18
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-moviewalker}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-moviewalker}
    volumes:
      - mongo-movie-data:/data/db
    networks:
      - movie-walker
    healthcheck:
      test: ["CMD", "mongo", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-movie-data:/data
    networks:
      - movie-walker
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  movie-walker:
    driver: bridge

volumes:
  mongo-movie-data:
  redis-movie-data:
